<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css" integrity="sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <title>Ulang Tahun Mama</title>
</head>
<body>
    <main class ="main-container">
        <div class="animate-container"></div>
            <div class="animate-cake">
                <i class="bi bi-cake-fill"></i>
            </div>
            <div class="animate-text">
                <h1 class="Happy">
                    <span>H</span>
                    <span>A</span>
                    <span>P</span>
                    <span>P</span>
                    <span>Y</span>
                </h1>
                <h1 class="Birthday">
                    <span>B</span>
                    <span>I</span>
                    <span>R</span>
                    <span>T</span>
                    <span>H</span>
                    <span>D</span>
                    <span>A</span>
                    <span>Y</span>
                </h1>
            </div>
        </div>
        <div class="greetings-container">
            <div class="greetings-text">
                <p>Selamat Ulang Tahun Mama</p>
                <p>Semoga umur nya mama berkah, selalu diberikan kesehatan, diijabah semua doanya, selalu dipertemukan dengan orang orang baik, digugurkan semua dosanya. Doa terbaik ku hanya untuk mama.</p>
            </div>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
